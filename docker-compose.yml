# ─────────────────────────────────────────────────────────────────────────────
# WorkFlow Monitor — Production Docker Compose
# Usage:
#   cp .env.example .env   # fill in your values
#   docker compose up -d
# ─────────────────────────────────────────────────────────────────────────────

services:
  # ── PostgreSQL ───────────────────────────────────────────────────────────
  db:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: workflow_monitor
      POSTGRES_USER: ${DB_USER:-workflow}
      POSTGRES_PASSWORD: ${DB_PASSWORD:?Set DB_PASSWORD in .env}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "${DB_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-workflow} -d workflow_monitor"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Database migrations ─────────────────────────────────────────────────
  migrate:
    build: .
    command: >
      sh -c "npx prisma migrate deploy && npx tsx prisma/seed.ts"
    environment:
      DATABASE_URL: postgresql://${DB_USER:-workflow}:${DB_PASSWORD}@db:5432/workflow_monitor
    depends_on:
      db:
        condition: service_healthy

  # ── Application ─────────────────────────────────────────────────────────
  app:
    build: .
    restart: unless-stopped
    ports:
      - "${APP_PORT:-3000}:3000"
    environment:
      DATABASE_URL: postgresql://${DB_USER:-workflow}:${DB_PASSWORD}@db:5432/workflow_monitor
      AUTH_SECRET: ${AUTH_SECRET:?Set AUTH_SECRET in .env}
      NEXTAUTH_URL: ${NEXTAUTH_URL:-http://localhost:3000}
      NODE_ENV: production
      LOG_LEVEL: ${LOG_LEVEL:-info}
      # Email (Resend)
      RESEND_API_KEY: ${RESEND_API_KEY:-}
      EMAIL_FROM: ${EMAIL_FROM:-WorkFlowPro <onboarding@resend.dev>}
      # File uploads
      UPLOAD_DIR: /app/uploads
      MAX_FILE_SIZE_MB: ${MAX_FILE_SIZE_MB:-10}
      # DB pool
      DB_POOL_SIZE: ${DB_POOL_SIZE:-10}
    volumes:
      - uploads:/app/uploads
    depends_on:
      db:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully

volumes:
  pgdata:
  uploads:
